<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animasi Hati Menyatu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0914; /* Latar belakang gelap estetik */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Wadah Grafis Utama -->
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById("heartCanvas");
        const ctx = canvas.getContext("2d");

        // Menyesuaikan ukuran kanvas dengan layar HP secara penuh
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        const particles = [];
        const particleCount = 600; // Jumlah total hati (bisa ditambah jika HP Anda kuat)
        let time = 0;

        // Rumus matematika kurva hati (Heart Shape Formula)
        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        // Cetak partikel pertama kali secara berhamburan acak (Scatter)
        for (let i = 0; i < particleCount; i++) {
            // Tentukan posisi akhir pembentuk hati raksasa terlebih dahulu
            let angle = Math.random() * Math.PI * 2;
            let targetPos = getHeartPoint(angle);

            // Berikan ukuran skala hati raksasa agar pas di tengah layar HP
            let scale = Math.min(canvas.width, canvas.height) / 30; 

            particles.push({
                // Posisi Awal: Tersebar acak di seluruh penjuru layar
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                
                // Posisi Target: Koordinat pembentuk hati raksasa di tengah
                targetX: canvas.width / 2 + targetPos.x * scale,
                targetY: canvas.height / 2 + targetPos.y * scale,
                
                // Properti Fisika & Visual
                size: Math.random() * 3 + 2, // Ukuran partikel hati kecil
                speed: Math.random() * 0.02 + 0.01, // Kecepatan pergerakan menyatu
                color: `hsl(${Math.random() * 30 + 340}, 100%, ${Math.random() * 30 + 60}%)`, // Gradasi warna pink/merah
                wobble: Math.random() * 100 // Efek goyangan terbang saat bergerak
            });
        }

        // Fungsi menggambar bentuk hati kecil untuk setiap partikel
        function drawMiniHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y - size / 2, x - size / 2, y - size / 2);
            ctx.quadraticCurveTo(x - size, y - size / 2, x - size, y + size / 4);
            ctx.quadraticCurveTo(x - size, y + size, x, y + size * 1.5);
            ctx.quadraticCurveTo(x + size, y + size, x + size, y + size / 4);
            ctx.quadraticCurveTo(x + size, y - size / 2, x + size / 2, y - size / 2);
            ctx.quadraticCurveTo(x, y - size / 2, x, y + size / 4);
            ctx.closePath();
            ctx.fill();
        }

        // Loop Animasi Konstan (60 Frame Per Detik)
        function animate() {
            // Memberikan efek bayangan blur transparan saat hati bergerak terbang
            ctx.fillStyle = "rgba(11, 9, 20, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            time += 0.05;

            particles.forEach(p => {
                // Logika Interpolasi Linier (Lerp) untuk menarik hati terbang ke posisinya
                let dx = p.targetX - p.x;
                let dy = p.targetY - p.y;
                
                // Efek terbang meliuk-liuk sebelum menyatu sempurna
                let sineWobble = Math.sin(time + p.wobble) * 0.5;

                p.x += dx * p.speed + sineWobble;
                p.y += dy * p.speed;

                // Tambahkan efek detak jantung (pulsing) setelah hati menyatu sempurna
                if (Math.abs(dx) < 2 && Math.abs(dy) < 2) {
                    let pulse = Math.sin(time * 2) * 2;
                    drawMiniHeart(p.targetX + (p.targetX - canvas.width/2) * pulse * 0.02, p.targetY + (p.targetY - canvas.height/2) * pulse * 0.02, p.size, p.color);
                } else {
                    // Gambar saat kondisi masih berterbangan
                    drawMiniHeart(p.x, p.y, p.size, p.color);
                }
            });

            requestAnimationFrame(animate);
        }

        // Jalankan Animasi
        animate();

        // Mengatur ulang posisi target jika layar HP diputar (di-rotate)
        window.addEventListener('resize', () => {
            resizeCanvas();
            let scale = Math.min(canvas.width, canvas.height) / 30;
            particles.forEach((p, index) => {
                let angle = (index / particleCount) * Math.PI * 2;
                let targetPos = getHeartPoint(angle);
                p.targetX = canvas.width / 2 + targetPos.x * scale;
                p.targetY = canvas.height / 2 + targetPos.y * scale;
            });
        });
    </script>

</body>
</html>
